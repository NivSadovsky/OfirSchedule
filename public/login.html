<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>קביעת פגישות - מכללת ספיר</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <img class="logo" src="https://www.sapir.ac.il/sites/default/files/styles/main_mobile/public/2023-12/sapir_logo.png" alt="לוגו מכללת ספיר" onerror="this.style.display='none'">
      <h1 id="login-title">מערכת קביעת פגישות</h1>
      <p id="login-subtitle">מכללת ספיר – קבע/י פגישה עם המרצה</p>
      <a href="/auth/google" class="btn-google">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        כניסה עם חשבון Google
      </a>
      <div id="error-msg" style="margin-top:16px;color:#c62828;display:none;">
        שגיאה בהתחברות. אנא נסה שוב.
      </div>
    </div>
  </div>
  <script>
    if (location.search.includes('error=auth')) {
      document.getElementById('error-msg').style.display = 'block';
    }
    // Load course name
    fetch('/api/slots/settings').then(r => r.json()).then(s => {
      if (s.course_name) {
        document.getElementById('login-title').textContent = s.course_name;
        if (s.course_period) {
          document.getElementById('login-subtitle').textContent = `מכללת ספיר – ${s.course_period}`;
        }
      }
    }).catch(() => {});
    // If already logged in, redirect
    fetch('/api/me').then(r => r.json()).then(user => {
      if (user) {
        location.href = user.role === 'lecturer' ? '/lecturer.html' : '/index.html';
      }
    });
  </script>
</body>
</html>
